name: gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-24.04
    container:
      # Official Ubuntu 26.04 amd64 image. Updating this digest and the
      # release-profile manifest is an explicit toolchain change.
      image: ubuntu:26.04@sha256:c6c0067e0e45b7a826eaebb193cef957be28045380963a9b1eeb2a5d3c70a1b9
    steps:
      - name: Install toolchain
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            gcc \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi \
            make \
            python3 \
            clang

      - uses: actions/checkout@v4
        with:
          # Always test the event's immutable commit. Never resolve a moving branch ref here.
          ref: ${{ github.sha }}

      - name: Prepare pinned main branch
        if: github.event_name == 'push'
        run: |
          git switch -C main "$GITHUB_SHA"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Run authoritative main release verification
        if: github.event_name == 'push'
        run: /usr/bin/python3 scripts/release_gate.py

      - name: Verify pull request
        if: github.event_name == 'pull_request'
        run: |
          make check-build-profile
          make gate
          make check-decoder-sanitize
          make check-encoder-sanitize
          make check-clang

      - name: Static analyzer
        run: make check-analyze
