name: gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            make \
            python3

      - name: Run release gate
        run: make gate

      - name: Static analyzer
        run: make check-analyze

      # Second-compiler leg: clang must build warning-free and its encoder must produce
      # byte-identical blobs (golden manifest) — proves the wire is compiler-independent.
      - name: Clang build + host checks
        run: |
          sudo apt-get install -y --no-install-recommends clang
          make CC=clang -B all
          make check check-malformed check-golden
